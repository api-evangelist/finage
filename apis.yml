apis:
  - name: Finage Market Data API
    description: >-
      Read-only REST API for real-time and historical market data: last
      quotes/trades, OHLCV aggregates, and snapshots for US and global stocks,
      forex, crypto, CFD indices and ETFs, plus fundamentals (financial
      statements, ratios, holders), economic/earnings/dividend calendars,
      market news, technical indicators, and symbol search. Authenticated with
      an apikey query parameter; responses are gzip-compressed JSON.
    humanURL: https://finage.co.uk/docs/api
