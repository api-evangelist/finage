name: Finage
description: >-
  Finage is a London-based real-time and historical market data provider
  covering US and global stocks, forex, cryptocurrencies, CFD indices, ETFs,
  bonds, and company fundamentals. Data is delivered through a read-only REST
  API (api.finage.co.uk, API-key auth, 72 documented endpoints spanning
  quotes, trades, OHLCV aggregates, snapshots, financial statements,
  calendars, news, and technical indicators), dedicated per-customer WebSocket
  streams on finage.ws for real-time trades and quotes, and embeddable website
  widgets served from cdn.finage.co.uk. Plans range from a free 1,000
  request/month tier through Basic API packages to Professional unlimited
  WebSocket feeds, with a 3-day free trial across all markets.
