    get:
      operationId: forexSnapshotApi
      summary: Forex Snapshot API
      description: The Finage Forex Signal API is an AI-powered forecasting tool that delivers real-time trading
        signals based on widely used technical indicators such as RSI, MACD, SMA, and Bollinger Bands. Each response
        includes a recommended signal (buy, sell, or hold), a confidence score, and the full set of indicators used
        to generate the result.
