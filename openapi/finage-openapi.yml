  /fnd/signals/forex/{interval}/{symbol}:
    get:
      operationId: forexSignalApi
      summary: Forex Signal API
      description: The Finage Signal API is an forecasting tool that delivers real-time trading signals based on
        widely used technical indicators such as RSI, MACD, SMA, and Bollinger Bands. Each response includes a recommended
        signal (buy, sell, or hold), a confidence score, and the full set of indicators used to generate the result.
      tags:
      - Fundamentals
      parameters:
      - name: interval
        in: path
        required: true
        description: 'Specifies the time frame used for signal analysis. Available values: daily, weekly.'
        schema:
          type: string
      - name: symbol
        in: path
        required: true
        description: The market symbol for which the signal should be generated. Accepts currency pairs such as
          GBPUSD, EURUSD, USDJPY, etc.
        schema:
          type: string
      responses:
        '200':
          description: Forex Signal API response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    description: Timestamp
                  symbol:
                    type: string
                    description: Symbol Name
                  signal:
                    type: string
                    description: 'Trading signal: buy, sell, or hold, based on market indicators.'
                  confidence:
                    type: number
                    description: A score between 0 and 1 indicating the confidence level of the signal. Higher means
                      more reliable.
                  indicators:
                    type: array
                    items: *id001
                    description: Indicator Parameters
                  sma_20:
                    type: number
                    description: 20-period Simple Moving Average of the price, indicating short-term trend.
                  sma_50:
                    type: number
                    description: 50-period Simple Moving Average, used for detecting medium-term trend direction.
                  rsi:
                    type: number
                    description: Relative Strength Index (0–100), indicating whether the asset is overbought (>70)
                      or oversold (<30).
                  macd:
                    type: number
                    description: Moving Average Convergence Divergence value; helps track momentum and trend strength.
                  macd_signal:
                    type: number
                    description: Signal line derived from the MACD, used to detect buy/sell crossovers.
                  macd_diff:
                    type: number
                    description: Difference between macd and macd_signal; positive values may indicate bullish momentum.
                  bollinger_high:
                    type: number
                    description: Upper band of the Bollinger Bands; a potential resistance or overbought zone.
                  bollinger_low:
                    type: number
                    description: Lower band of the Bollinger Bands; a potential support or oversold zone.
                  ma_crossover:
                    type: boolean
                    description: Boolean value indicating whether a short-term MA crossed above a long-term MA (bullish).
                  macd_cross:
                    type: boolean
                    description: Boolean value indicating if the MACD line crossed the signal line (often a trade
                      trigger).
                  price:
                    type: number
                    description: The market price of the asset at the moment the signal was generated.
              example:
                timestamp: '2025-07-25T12:18:23.261462863Z'
                symbol: GBPUSD
                signal: buy
                confidence: 0.65
                indicators:
                  sma_20: 1.34534
                  sma_50: 1.34589
                  rsi: 39.46
                  macd: -0.00096
                  macd_signal: -0.00099
                  macd_diff: 3.0e-05
                  bollinger_high: 1.3476
                  bollinger_low: 1.34417
                  ma_crossover: false
                  macd_cross: true
                price: 1.3453123
        '401':
          $ref: '#/components/responses/Unauthorized'
