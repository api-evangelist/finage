  /fnd/signals/forex/{timeframe}/{symbol}:
    get:
      operationId: forexTechnicalIndicators
      summary: Forex Technical Indicators
      description: The Forex Technical Indicators API is designed to provide dynamic results for a wide range of
        technical analysis calculations, including signals like confidence, as well as indicators such as SMA, RSI,
        MACD, Bollinger Bands, and more.
      tags:
      - Fundamentals
      parameters:
      - name: timeframe
        in: path
        required: true
        description: The time interval for the technical indicators and signals (daily, weekly).
        schema:
          type: string
      - name: symbol
        in: path
        required: true
        description: The currency pair symbol you want to query (e.g., EURUSD, GBPUSD).
        schema:
          type: string
      responses:
        '200':
          description: Forex Technical Indicators response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    description: Timestamp [date]
                  symbol:
                    type: string
                    description: The currency pair symbol (e.g., EURUSD).
                  signal:
                    type: string
                    description: The trading signal generated based on the indicators (e.g., buy, sell, hold).
                  confidence:
                    type: number
                    description: A score between 0 and 1 indicating the strength of the signal (calculated by us).
                  indicators:
                    type: array
                    items: *id001
                    description: An object containing technical indicator values used in the signal calculation.
                  sma_20:
                    type: number
                    description: The 20-period simple moving average (SMA).
                  sma_50:
                    type: number
                    description: The 50-period simple moving average (SMA).
                  rsi:
                    type: number
                    description: The relative strength index (RSI), showing momentum on a scale of 0 to 100.
                  macd:
                    type: number
                    description: The moving average convergence divergence (MACD) value.
                  macd_signal:
                    type: number
                    description: The signal line of the MACD.
                  macd_diff:
                    type: number
                    description: The difference between MACD and the MACD signal line.
                  bollinger_high:
                    type: number
                    description: The upper band of the Bollinger Bands.
                  bollinger_low:
                    type: number
                    description: The lower band of the Bollinger Bands.
                  ma_crossover:
                    type: boolean
                    description: A boolean showing whether a moving average crossover has occurred (true/false).
                  macd_cross:
                    type: boolean
                    description: A boolean showing whether the MACD and signal line have crossed (true/false).
                  price:
                    type: number
                    description: The latest price of the currency pair at the time of data generation.
              example:
              - timestamp: '2025-05-06T10:41:32.571747715Z'
                symbol: EURUSD
                signal: hold
                confidence: 0.5
                indicators:
                  sma_20: 1.13228
                  sma_50: 1.13269
                  rsi: 42.61
                  macd: -4.0e-05
                  macd_signal: 0.00023
                  macd_diff: -0.00027
                  bollinger_high: 1.1347
                  bollinger_low: 1.13069
                  ma_crossover: false
                  macd_cross: false
                price: 1.1317059
        '401':
          $ref: '#/components/responses/Unauthorized'
